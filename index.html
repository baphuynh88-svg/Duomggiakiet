<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro System</title>
<style>
:root { --mc: #0084ff; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden; background: #000; color: #fff; }

#bg {
  position: fixed; inset: 0; z-index: 0;
  background: url('https://i.postimg.cc/9068tQMM/blackhole.jpg') center/cover;
  transition: .4s;
}

/* ---- AUTH ---- */
#auth {
  position: relative; z-index: 10;
  height: 100vh; display: flex; justify-content: center; align-items: center;
}
.abox {
  background: rgba(0,0,0,.83); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.13); border-radius: 22px;
  padding: 34px 28px; width: 310px; text-align: center;
}
.abox h2 { font-size: 20px; margin-bottom: 20px; }
.ainp {
  display: block; width: 100%; padding: 12px 14px; margin: 8px 0;
  background: rgba(255,255,255,.11); border: none; border-radius: 9px;
  color: #fff; font-size: 15px; outline: none;
}
.ainp::placeholder { color: rgba(255,255,255,.4); }
.abtn {
  width: 100%; padding: 13px; margin-top: 10px; border: none; border-radius: 9px;
  background: linear-gradient(45deg,#ff8c00,#ff4500);
  color: #fff; font-size: 15px; font-weight: bold; cursor: pointer;
}
.alink { display: block; margin-top: 14px; font-size: 12px; }
.alink a { color: #ffae42; text-decoration: none; }

/* ---- MAIN ---- */
#app { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }

.hdr {
  background: var(--mc); color: #fff;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 15px; font-size: 16px; font-weight: bold;
  min-height: 50px; flex-shrink: 0;
}
.hdr-back { font-size: 22px; cursor: pointer; user-select: none; }

.scr {
  flex: 1; overflow-y: auto;
  padding: 14px 14px 80px;
}

.card {
  background: #fff; color: #333; border-radius: 14px;
  padding: 18px; margin-bottom: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}

.mrow {
  background: #fff; color: #333; border: 2px solid #111;
  border-radius: 12px; padding: 16px 18px; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 15px; font-weight: bold; cursor: pointer;
}

/* profile */
.avt {
  width: 96px; height: 96px; border-radius: 50%;
  border: 3px solid var(--mc); object-fit: cover;
  display: block; margin: 0 auto 8px; cursor: pointer; background: #222;
}
.slbl {
  display: block; font-size: 11px; font-weight: bold;
  text-transform: uppercase; letter-spacing: 1px;
  color: #999; margin: 14px 0 7px;
}
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 4px; }
.cbtn { padding: 11px; border: none; border-radius: 8px; color: #fff; font-size: 12px; font-weight: bold; cursor: pointer; }
.fbtn {
  display: block; width: 100%; padding: 12px; border: none; border-radius: 9px;
  color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 8px;
}

/* songs */
.srow {
  display: flex; align-items: center; gap: 8px;
  padding: 10px; border-radius: 9px;
  background: #f6f6f6; border: 1px solid #eee; margin-bottom: 7px;
}
.srow.on { background: #e3f2fd; border-color: #90caf9; }
.sinfo { flex: 1; overflow: hidden; }
.sname { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ssz   { font-size: 11px; color: #aaa; }
.pbtn { background: var(--mc); color: #fff; border: none; border-radius: 7px; padding: 7px 13px; font-size: 14px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
.dbtn { background: #f44;      color: #fff; border: none; border-radius: 7px; padding: 7px 10px; font-size: 14px; font-weight: bold; cursor: pointer; flex-shrink: 0; }

.stbar { padding: 9px 12px; border-radius: 8px; font-size: 13px; margin-top: 9px; display: none; }
.st-ok { background:#e8f5e9; color:#2e7d32; }
.st-er { background:#ffebee; color:#c62828; }
.st-ld { background:#fff8e1; color:#e65100; }
.nowpl { background:#e8f5e9; color:#2e7d32; padding:9px 12px; border-radius:8px; font-size:13px; margin:10px 0 4px; }
#player { width:100%; margin-top:10px; border-radius:8px; }

/* nav */
.nav {
  position: fixed; bottom: 0; left: 0; width: 100%;
  height: 62px; background: #fff; border-top: 1px solid #e5e5e5;
  display: flex; z-index: 999;
}
.nitem {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #999; cursor: pointer; font-size: 10px; font-weight: bold; gap: 2px;
}
.nitem.on { color: var(--mc); }
.nitem svg { width: 22px; height: 22px; fill: currentColor; }

.hide { display: none !important; }
</style>
</head>
<body>

<div id="bg"></div>

<!-- AUTH -->
<div id="auth">
  <div class="abox">
    <h2 id="atitle">🔐 Hệ Thống</h2>
    <input id="iu" class="ainp" type="text"     placeholder="Tài khoản">
    <input id="ip" class="ainp" type="password" placeholder="Mật khẩu">
    <button class="abtn" id="abtn">XÁC NHẬN</button>
    <div class="alink"><a href="#" id="atgl">Đăng ký tài khoản mới</a></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <div class="hdr">
    <span class="hdr-back" id="backBtn">←</span>
    <span id="htitle">Trang chủ</span>
  </div>

  <!-- home -->
  <div id="v-home" class="scr">
    <div class="card" style="text-align:center;padding:24px 18px;">
      <div style="font-size:32px;margin-bottom:8px;">👋</div>
      <div style="font-size:20px;font-weight:bold;margin-bottom:4px;">Xin chào!</div>
      <div id="guser" style="color:#888;font-size:14px;"></div>
    </div>
    <div class="mrow" id="goMusic"><span>🎵 Kho Nhạc</span><span>›</span></div>
  </div>

  <!-- music -->
  <div id="v-music" class="scr hide">
    <div class="card">
      <h3 style="margin-bottom:12px;">🎵 Kho Nhạc</h3>
      <input id="mname" class="ainp" style="background:#f0f0f0;color:#333;" placeholder="Tên bài (để trống = tên file)">
      <input id="ffile" type="file" accept="audio/*" style="display:none">
      <button class="fbtn" style="background:#ff5500;" id="pickBtn">📂 CHỌN FILE NHẠC</button>
      <div id="stbar" class="stbar"></div>
      <div id="nowpl" class="nowpl hide">▶️ Đang phát: <strong id="nowname"></strong></div>
      <audio id="player" controls class="hide"></audio>
      <div id="slist" style="margin-top:14px;"></div>
    </div>
  </div>

  <!-- me -->
  <div id="v-me" class="scr hide">
    <div class="card">
      <input id="afile" type="file" accept="image/*" style="display:none">
      <img id="avt" class="avt" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23333'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50' fill='%23fff'%3E%F0%9F%91%A4%3C/text%3E%3C/svg%3E">
      <div style="text-align:center;">
        <div id="dname" style="font-size:18px;font-weight:bold;margin-bottom:2px;"></div>
        <div style="font-size:11px;color:#aaa;margin-bottom:10px;">Nhấn ảnh để đổi avatar</div>
        <button class="fbtn" style="background:#555;width:auto;padding:8px 24px;display:inline-block;" id="logoutBtn">Đăng xuất</button>
      </div>
      <div style="border-top:1px solid #eee;margin-top:16px;padding-top:4px;">
        <span class="slbl">🎨 Màu giao diện</span>
        <div class="g2">
          <button class="cbtn" style="background:#8e44ad;" data-color="#8e44ad">TÍM</button>
          <button class="cbtn" style="background:#e74c3c;" data-color="#e74c3c">ĐỎ</button>
          <button class="cbtn" style="background:#0084ff;" data-color="#0084ff">XANH</button>
          <button class="cbtn" style="background:#1a7a1a;" data-color="#1a7a1a">XANH LÁ</button>
        </div>
        <span class="slbl">🖼️ Hình nền</span>
        <input id="bfile" type="file" accept="image/*" style="display:none">
        <button class="fbtn" style="background:#28a745;" id="bgPick">📷 TẢI ẢNH TỪ MÁY</button>
        <div class="g2" style="margin-top:8px;">
          <button class="cbtn" style="background:linear-gradient(135deg,#483d8b,#000);" data-bg="https://i.postimg.cc/dV8z91fW/Galaxy.jpeg">GALAXY 1</button>
          <button class="cbtn" style="background:linear-gradient(135deg,#2f4f4f,#000);" data-bg="https://i.postimg.cc/MKLHVsBw/bd55c52a-f692-42fe-bbb9-dd3780099cbc.jpg">GALAXY 2</button>
        </div>
        <button class="fbtn" style="background:#888;" id="resetBg">🔄 Nền mặc định</button>
      </div>
    </div>
    <div id="admcard" class="card hide">
      <h4 style="color:#ff4500;margin-bottom:10px;">⚙️ Quản lý User (Admin)</h4>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;color:#333;">
          <thead><tr style="background:#f0f0f0;"><th style="padding:7px;text-align:left;">User</th><th style="padding:7px;text-align:left;">Pass</th><th style="padding:7px;">Xóa</th></tr></thead>
          <tbody id="admtbl"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- nav -->
  <div class="nav">
    <div class="nitem on" id="n-home">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Main
    </div>
    <div class="nitem" id="n-me">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Tôi
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
var CU   = "";      // current user
var VIEW = "home";
var MODE = "login"; // "login" | "register"
var DB   = null;

// ─────────────────────────────────────────
//  INDEXEDDB
// ─────────────────────────────────────────
(function openDB() {
  var r = indexedDB.open("PSDB", 1);
  r.onupgradeneeded = function(e) {
    var d = e.target.result;
    if (!d.objectStoreNames.contains("songs"))    d.createObjectStore("songs",    {keyPath:"id"});
    if (!d.objectStoreNames.contains("settings")) d.createObjectStore("settings", {keyPath:"id"});
    if (!d.objectStoreNames.contains("accounts")) d.createObjectStore("accounts", {keyPath:"id"});
  };
  r.onsuccess = function(e) { DB = e.target.result; };
  r.onerror   = function()  { alert("Trình duyệt không hỗ trợ IndexedDB!"); };
})();

// wrappers
function dbPut(store, obj, cb) {
  var tx = DB.transaction([store], "readwrite");
  tx.objectStore(store).put(obj);
  tx.oncomplete = function() { if (cb) cb(); };
}
function dbGet(store, key, cb) {
  var tx = DB.transaction([store], "readonly");
  tx.objectStore(store).get(key).onsuccess = function(e) { cb(e.target.result || null); };
}
function dbDel(store, key, cb) {
  var tx = DB.transaction([store], "readwrite");
  tx.objectStore(store).delete(key);
  tx.oncomplete = function() { if (cb) cb(); };
}
function dbAll(store, cb) {
  var items = [];
  DB.transaction([store], "readonly").objectStore(store).openCursor().onsuccess = function(e) {
    var c = e.target.result;
    if (c) { items.push(c.value); c.continue(); }
    else cb(items);
  };
}

// ─────────────────────────────────────────
//  ACCOUNTS — lưu trong IndexedDB
// ─────────────────────────────────────────
function getAccounts(cb) {
  if (!DB) { cb([]); return; }
  dbAll("accounts", cb);
}
function addAccount(u, p, cb) {
  dbPut("accounts", {id: u, u: u, p: p}, cb);
}

// ─────────────────────────────────────────
//  AUTH EVENTS
// ─────────────────────────────────────────
document.getElementById("atgl").addEventListener("click", function(e) {
  e.preventDefault();
  MODE = (MODE === "login") ? "register" : "login";
  document.getElementById("atitle").innerText = (MODE === "login") ? "🔐 Hệ Thống" : "📝 Đăng ký";
  document.getElementById("atgl").innerText   = (MODE === "login") ? "Đăng ký tài khoản mới" : "← Quay lại đăng nhập";
});

document.getElementById("abtn").addEventListener("click", function() {
  var u = document.getElementById("iu").value.trim();
  var p = document.getElementById("ip").value.trim();
  if (!u || !p) { alert("Nhập đủ tài khoản và mật khẩu!"); return; }
  if (!DB)      { alert("Database chưa sẵn sàng, thử lại!"); return; }

  if (MODE === "login") {
    // Admin cứng
    if (u === "admin" && p === "admin123") { startApp(u); return; }
    // User thường
    dbGet("accounts", u, function(rec) {
      if (rec && rec.p === p) startApp(u);
      else alert("❌ Sai tài khoản hoặc mật khẩu!");
    });
  } else {
    if (u === "admin") { alert("Tên này không được dùng!"); return; }
    dbGet("accounts", u, function(rec) {
      if (rec) { alert("Tài khoản đã tồn tại!"); return; }
      addAccount(u, p, function() {
        alert("✅ Đăng ký thành công! Hãy đăng nhập.");
        MODE = "login";
        document.getElementById("atitle").innerText = "🔐 Hệ Thống";
        document.getElementById("atgl").innerText   = "Đăng ký tài khoản mới";
      });
    });
  }
});

document.getElementById("ip").addEventListener("keydown", function(e) {
  if (e.key === "Enter") document.getElementById("abtn").click();
});

// ─────────────────────────────────────────
//  START APP
// ─────────────────────────────────────────
function startApp(u) {
  CU = u;
  document.getElementById("auth").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  document.getElementById("guser").innerText = "Chào mừng, " + u + "!";
  document.getElementById("dname").innerText = u;

  // load settings
  dbGet("settings", CU+"_color", function(r){ if(r) applyColor(r.v); });
  dbGet("settings", CU+"_bg",    function(r){ if(r) applyBg(r.v); });
  dbGet("settings", CU+"_avt",   function(r){ if(r) document.getElementById("avt").src = r.v; });

  if (u === "admin") {
    document.getElementById("admcard").classList.remove("hide");
    renderAdmin();
  }
  goTab("home");
}

// ─────────────────────────────────────────
//  SETTINGS
// ─────────────────────────────────────────
document.getElementById("logoutBtn").addEventListener("click", function() {
  if (confirm("Đăng xuất?")) location.reload();
});

document.getElementById("avt").addEventListener("click", function() {
  document.getElementById("afile").click();
});
document.getElementById("afile").addEventListener("change", function() {
  readImg(this, function(b64) {
    document.getElementById("avt").src = b64;
    dbPut("settings", {id: CU+"_avt", v: b64});
  });
});

document.getElementById("bgPick").addEventListener("click", function() {
  document.getElementById("bfile").click();
});
document.getElementById("bfile").addEventListener("change", function() {
  readImg(this, function(b64) {
    applyBg(b64);
    dbPut("settings", {id: CU+"_bg", v: b64});
  });
});

document.getElementById("resetBg").addEventListener("click", function() {
  applyBg("https://i.postimg.cc/9068tQMM/blackhole.jpg");
  dbPut("settings", {id: CU+"_bg", v: "https://i.postimg.cc/9068tQMM/blackhole.jpg"});
});

// color buttons
document.querySelectorAll("[data-color]").forEach(function(btn) {
  btn.addEventListener("click", function() {
    var c = this.getAttribute("data-color");
    applyColor(c);
    dbPut("settings", {id: CU+"_color", v: c});
  });
});

// bg preset buttons
document.querySelectorAll("[data-bg]").forEach(function(btn) {
  btn.addEventListener("click", function() {
    var url = this.getAttribute("data-bg");
    applyBg(url);
    dbPut("settings", {id: CU+"_bg", v: url});
  });
});

function applyColor(c) {
  document.documentElement.style.setProperty("--mc", c);
  document.querySelector(".hdr").style.background = c;
}
function applyBg(v) {
  document.getElementById("bg").style.backgroundImage = "url('" + v + "')";
}
function readImg(input, cb) {
  var f = input.files[0];
  if (!f) return;
  if (f.size > 3*1024*1024) { alert("Ảnh < 3MB thôi bro!"); input.value=""; return; }
  var r = new FileReader();
  r.onload = function(e) { cb(e.target.result); };
  r.readAsDataURL(f);
  input.value = "";
}

// ─────────────────────────────────────────
//  KHO NHẠC
// ─────────────────────────────────────────
document.getElementById("pickBtn").addEventListener("click", function() {
  document.getElementById("ffile").click();
});
document.getElementById("ffile").addEventListener("change", function() {
  var f = this.files[0];
  if (!f) return;
  var name = document.getElementById("mname").value.trim() || f.name;
  setSt("⏳ Đang đọc file...", "st-ld");
  var r = new FileReader();
  r.onload = function(e) {
    var id = CU + "_" + Date.now();
    dbPut("songs", {id:id, user:CU, name:name, mime:f.type||"audio/mpeg", buf:e.target.result, size:f.size, ts:Date.now()}, function() {
      setSt("✅ Đã lưu: " + name, "st-ok");
      document.getElementById("mname").value = "";
      renderSongs();
    });
  };
  r.onerror = function() { setSt("❌ Đọc file thất bại!", "st-er"); };
  r.readAsArrayBuffer(f);
  this.value = "";
});

function renderSongs() {
  var el = document.getElementById("slist");
  el.innerHTML = "";
  dbAll("songs", function(all) {
    var songs = all.filter(function(s){ return s.user === CU; });
    if (!songs.length) {
      el.innerHTML = "<p style='text-align:center;color:#aaa;padding:20px 0;font-size:13px;'>Chưa có bài nào.<br>Nhấn <b>CHỌN FILE NHẠC</b> để thêm!</p>";
      return;
    }
    songs.sort(function(a,b){ return b.ts - a.ts; });
    songs.forEach(function(s) {
      var mb  = (s.size/1024/1024).toFixed(1);
      var div = document.createElement("div");
      div.className = "srow";
      div.id = "r_" + s.id;
      div.innerHTML =
        '<div class="sinfo"><div class="sname">🎵 ' + esc(s.name) + '</div><div class="ssz">' + mb + ' MB</div></div>' +
        '<button class="pbtn" data-id="' + ea(s.id) + '" data-name="' + ea(s.name) + '">▶</button>' +
        '<button class="dbtn" data-id="' + ea(s.id) + '">✕</button>';
      el.appendChild(div);
    });

    // play buttons
    el.querySelectorAll(".pbtn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        playSong(this.getAttribute("data-id"), this.getAttribute("data-name"));
      });
    });
    // delete buttons
    el.querySelectorAll(".dbtn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        delSong(this.getAttribute("data-id"));
      });
    });
  });
}

function playSong(id, name) {
  dbGet("songs", id, function(rec) {
    if (!rec) { alert("Không tìm thấy bài!"); return; }
    var blob = new Blob([rec.buf], {type: rec.mime||"audio/mpeg"});
    var url  = URL.createObjectURL(blob);
    var p    = document.getElementById("player");
    p.src    = url;
    p.classList.remove("hide");
    p.play().catch(function(){});
    document.getElementById("nowpl").classList.remove("hide");
    document.getElementById("nowname").innerText = name;
    document.querySelectorAll(".srow").forEach(function(r){ r.classList.remove("on"); });
    var row = document.getElementById("r_" + id);
    if (row) row.classList.add("on");
  });
}

function delSong(id) {
  if (!confirm("Xóa bài này?")) return;
  dbDel("songs", id, function() {
    var row = document.getElementById("r_" + id);
    if (row && row.classList.contains("on")) {
      var p = document.getElementById("player");
      p.pause(); p.src = ""; p.classList.add("hide");
      document.getElementById("nowpl").classList.add("hide");
    }
    renderSongs();
  });
}

function setSt(msg, cls) {
  var el = document.getElementById("stbar");
  el.className = "stbar " + cls;
  el.style.display = "block";
  el.innerText = msg;
  if (cls !== "st-ld") setTimeout(function(){ el.style.display="none"; }, 3000);
}

// ─────────────────────────────────────────
//  ADMIN
// ─────────────────────────────────────────
function renderAdmin() {
  dbAll("accounts", function(accs) {
    var html = "";
    accs.forEach(function(a) {
      html += "<tr><td style='padding:7px;'>" + esc(a.u) + "</td><td style='padding:7px;'>" + esc(a.p) +
              "</td><td style='padding:7px;text-align:center;'>" +
              "<button data-del='" + ea(a.u) +
