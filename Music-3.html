<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro System</title>
<style>
:root { --mc: #0084ff; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden; background: #000; color: #fff; }

#bg {
  position: fixed; inset: 0; z-index: 0;
  background: url('https://i.postimg.cc/9068tQMM/blackhole.jpg') center/cover;
  transition: .4s;
}

/* ---- AUTH ---- */
#auth {
  position: relative; z-index: 10;
  height: 100vh; display: flex; justify-content: center; align-items: center;
}
.abox {
  background: rgba(0,0,0,.83); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.13); border-radius: 22px;
  padding: 34px 28px; width: 310px; text-align: center;
}
.abox h2 { font-size: 20px; margin-bottom: 6px; }
.asubtitle { font-size: 12px; color: rgba(255,255,255,.5); margin-bottom: 18px; }
.ainp-wrap { position: relative; margin: 8px 0; }
.ainp {
  display: block; width: 100%; padding: 12px 14px;
  background: rgba(255,255,255,.11); border: 1.5px solid transparent; border-radius: 9px;
  color: #fff; font-size: 15px; outline: none; transition: border .2s;
}
.ainp:focus { border-color: rgba(255,255,255,.35); }
.ainp.err   { border-color: #ff5252; }
.ainp::placeholder { color: rgba(255,255,255,.4); }
.ainp-hint { font-size: 11px; margin: 2px 4px 0; min-height: 16px; text-align: left; }
.hint-err  { color: #ff5252; }
.hint-ok   { color: #69f0ae; }
.hint-info { color: rgba(255,255,255,.45); }
.abtn {
  width: 100%; padding: 13px; margin-top: 12px; border: none; border-radius: 9px;
  background: linear-gradient(45deg,#ff8c00,#ff4500);
  color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; transition: opacity .2s;
}
.abtn:active { opacity: .8; }
.auth-tabs { display: flex; margin-bottom: 20px; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,.08); }
.auth-tab {
  flex: 1; padding: 10px; border: none; background: none;
  color: rgba(255,255,255,.5); font-size: 14px; font-weight: bold; cursor: pointer; transition: .2s;
}
.auth-tab.on { background: rgba(255,255,255,.15); color: #fff; }

/* ---- MAIN ---- */
#app { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }

.hdr {
  background: var(--mc); color: #fff;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 15px; font-size: 16px; font-weight: bold;
  min-height: 50px; flex-shrink: 0;
}
.hdr-back { font-size: 22px; cursor: pointer; user-select: none; }

.scr {
  flex: 1; overflow-y: auto;
  padding: 14px 14px 80px;
}

.card {
  background: #fff; color: #333; border-radius: 14px;
  padding: 18px; margin-bottom: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}

.mrow {
  background: #fff; color: #333; border: 2px solid #111;
  border-radius: 12px; padding: 16px 18px; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 15px; font-weight: bold; cursor: pointer;
}

/* profile */
.avt {
  width: 96px; height: 96px; border-radius: 50%;
  border: 3px solid var(--mc); object-fit: cover;
  display: block; margin: 0 auto 8px; cursor: pointer; background: #222;
}
.slbl {
  display: block; font-size: 11px; font-weight: bold;
  text-transform: uppercase; letter-spacing: 1px;
  color: #999; margin: 14px 0 7px;
}
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 4px; }
.cbtn { padding: 11px; border: none; border-radius: 8px; color: #fff; font-size: 12px; font-weight: bold; cursor: pointer; }
.fbtn {
  display: block; width: 100%; padding: 12px; border: none; border-radius: 9px;
  color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 8px;
}

/* songs */
.srow {
  display: flex; align-items: center; gap: 8px;
  padding: 10px; border-radius: 9px;
  background: #f6f6f6; border: 1px solid #eee; margin-bottom: 7px;
}
.srow.on { background: #e3f2fd; border-color: #90caf9; }
.sinfo { flex: 1; overflow: hidden; }
.sname { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ssz   { font-size: 11px; color: #aaa; }
.pbtn { background: var(--mc); color: #fff; border: none; border-radius: 7px; padding: 7px 13px; font-size: 14px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
.dbtn { background: #f44;      color: #fff; border: none; border-radius: 7px; padding: 7px 10px; font-size: 14px; font-weight: bold; cursor: pointer; flex-shrink: 0; }

.stbar { padding: 9px 12px; border-radius: 8px; font-size: 13px; margin-top: 9px; display: none; }
.st-ok { background:#e8f5e9; color:#2e7d32; }
.st-er { background:#ffebee; color:#c62828; }
.st-ld { background:#fff8e1; color:#e65100; }
.nowpl { background:#e8f5e9; color:#2e7d32; padding:9px 12px; border-radius:8px; font-size:13px; margin:10px 0 4px; }
#player { width:100%; margin-top:10px; border-radius:8px; }

/* nav */
.nav {
  position: fixed; bottom: 0; left: 0; width: 100%;
  height: 62px; background: #fff; border-top: 1px solid #e5e5e5;
  display: flex; z-index: 999;
}
.nitem {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #999; cursor: pointer; font-size: 10px; font-weight: bold; gap: 2px;
}
.nitem.on { color: var(--mc); }
.nitem svg { width: 22px; height: 22px; fill: currentColor; }

.hide { display: none !important; }

/* ════════════════════════════════
   ANIMATIONS
════════════════════════════════ */

/* Màn hình đăng nhập — fade + slide up */
@keyframes authFadeIn {
  from { opacity: 0; transform: translateY(30px) scale(.96); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}
.abox {
  animation: authFadeIn .5s cubic-bezier(.22,.68,0,1.2) both;
}

/* Background blackhole — slow zoom in */
@keyframes bgZoom {
  from { transform: scale(1.08); }
  to   { transform: scale(1); }
}
#bg { animation: bgZoom 1.2s ease-out both; }

/* Tab switch — slide */
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(18px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}
.form-slide-right { animation: slideInRight .25s ease both; }
.form-slide-left  { animation: slideInLeft  .25s ease both; }

/* Nút bấm — ripple scale */
.abtn, .fbtn, .pbtn, .dbtn, .cbtn {
  transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
}
.abtn:active, .fbtn:active {
  transform: scale(.97);
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.pbtn:active { transform: scale(.93); }
.dbtn:active { transform: scale(.93); }
.cbtn:active { transform: scale(.95); }

/* Menu row tap */
.mrow {
  transition: transform .15s ease, box-shadow .15s ease;
}
.mrow:active { transform: scale(.98); box-shadow: 0 2px 12px rgba(0,0,0,.15); }

/* Danh sách bài hát — fade slide in từng item */
@keyframes songFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.srow {
  animation: songFadeIn .3s ease both;
  transition: background .2s, border-color .2s, transform .15s;
}
.srow:active { transform: scale(.99); }

/* Stagger delay cho từng bài */
.srow:nth-child(1)  { animation-delay: .03s; }
.srow:nth-child(2)  { animation-delay: .06s; }
.srow:nth-child(3)  { animation-delay: .09s; }
.srow:nth-child(4)  { animation-delay: .12s; }
.srow:nth-child(5)  { animation-delay: .15s; }
.srow:nth-child(6)  { animation-delay: .18s; }
.srow:nth-child(7)  { animation-delay: .21s; }
.srow:nth-child(8)  { animation-delay: .24s; }
.srow:nth-child(9)  { animation-delay: .27s; }
.srow:nth-child(10) { animation-delay: .30s; }

/* Header slide down */
@keyframes hdrSlide {
  from { opacity: 0; transform: translateY(-100%); }
  to   { opacity: 1; transform: translateY(0); }
}
.hdr { animation: hdrSlide .35s ease both; }

/* Nav slide up */
@keyframes navSlide {
  from { opacity: 0; transform: translateY(100%); }
  to   { opacity: 1; transform: translateY(0); }
}
.nav { animation: navSlide .35s ease both; }

/* Card fade in */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card {
  animation: cardIn .35s ease both;
  transition: box-shadow .2s;
}

/* Now playing pulse */
@keyframes npPulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .7; }
}
.nowpl { animation: npPulse 2s ease-in-out infinite; }

/* Tab active indicator */
.auth-tab { transition: background .2s, color .2s, transform .15s; }
.auth-tab:active { transform: scale(.96); }


/* ── WEATHER ── */
.w-card {
  background: linear-gradient(135deg,#1a237e,#0288d1);
  color:#fff; border-radius:18px; padding:20px;
  margin-bottom:14px; box-shadow:0 4px 20px rgba(0,0,0,.4);
  animation: cardIn .35s ease both;
}
.w-search { display:flex; gap:8px; margin-bottom:16px; }
.w-inp {
  flex:1; padding:11px 14px; border:none; border-radius:9px;
  background:rgba(255,255,255,.15); color:#fff; font-size:14px; outline:none;
}
.w-inp::placeholder { color:rgba(255,255,255,.5); }
.w-btn {
  padding:11px 16px; border:none; border-radius:9px;
  background:rgba(255,255,255,.2); color:#fff;
  font-size:14px; font-weight:bold; cursor:pointer;
  transition:background .2s;
}
.w-btn:active { background:rgba(255,255,255,.35); }
.w-main { text-align:center; padding:10px 0 16px; }
.w-icon { font-size:64px; line-height:1; margin-bottom:4px; }
.w-temp { font-size:52px; font-weight:bold; line-height:1; }
.w-desc { font-size:16px; opacity:.85; margin-top:6px; text-transform:capitalize; }
.w-city { font-size:13px; opacity:.6; margin-top:4px; }
.w-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px;
}
.w-item {
  background:rgba(255,255,255,.12); border-radius:12px;
  padding:12px; text-align:center;
}
.w-item-icon { font-size:22px; }
.w-item-val  { font-size:18px; font-weight:bold; margin:2px 0; }
.w-item-lbl  { font-size:11px; opacity:.65; }
.w-loading   { text-align:center; padding:30px; opacity:.7; font-size:14px; }
.w-err       { text-align:center; padding:20px; color:#ffcdd2; font-size:13px; }
</style>
</head>

<script type="module">
// ERROR LOGGER — hiện lỗi thẳng trên màn hình điện thoại, không cần F12
(function() {
  var box = document.createElement("div");
  box.id = "errbox";
  box.style.cssText = "display:none;position:fixed;bottom:70px;left:0;right:0;z-index:99999;" +
    "background:#b71c1c;color:#fff;font-size:12px;padding:10px 12px;max-height:45vh;" +
    "overflow-y:auto;border-top:3px solid #ff1744;";
  document.body.appendChild(box);

  function logErr(msg) {
    box.style.display = "block";
    var d = document.createElement("div");
    d.style.cssText = "padding:4px 0;border-bottom:1px solid rgba(255,255,255,.2);";
    d.innerText = "❌ " + msg;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  }

  window.onerror = function(msg, src, line) {
    logErr("Dòng " + line + ": " + msg);
    return false;
  };

  window.addEventListener("unhandledrejection", function(e) {
    logErr("Promise: " + (e.reason ? e.reason.message || e.reason : "unknown"));
  });

  var _ce = console.error;
  console.error = function() {
    logErr([].join.call(arguments, " "));
    _ce.apply(console, arguments);
  };

  window._logErr = logErr;
})();

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
var CU   = "";      // current user
var VIEW = "home";
var MODE = "login"; // "login" | "register"
var DB   = null;

// ─────────────────────────────────────────
//  INDEXEDDB
// ─────────────────────────────────────────
function openDB() {
  // Kiểm tra browser có hỗ trợ IndexedDB không
  if (!window.indexedDB) {
    window._logErr && window._logErr("Browser không có IndexedDB!");
    document.getElementById("btn-login").disabled = false;
    return;
  }

  var r;
  try {
    r = indexedDB.open("PSDB", 1);
  } catch(e) {
    window._logErr && window._logErr("Không mở được IndexedDB: " + e.message);
    return;
  }

  r.onupgradeneeded = function(e) {
    var d = e.target.result;
    if (!d.objectStoreNames.contains("songs"))    d.createObjectStore("songs",    {keyPath:"id"});
    if (!d.objectStoreNames.contains("settings")) d.createObjectStore("settings", {keyPath:"id"});
    if (!d.objectStoreNames.contains("accounts")) d.createObjectStore("accounts", {keyPath:"id"});
  };

  r.onsuccess = function(e) {
    DB = e.target.result;
    // Hiện thông báo DB ready trên màn hình (debug)
    var dbinfo = document.createElement("div");
    dbinfo.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99998;background:#1b5e20;color:#fff;font-size:11px;padding:4px 10px;text-align:center;";
    dbinfo.innerText = "✅ IndexedDB OK";
    document.body.appendChild(dbinfo);
    setTimeout(function(){ dbinfo.remove(); }, 2000);
  };

  r.onerror = function(e) {
    window._logErr && window._logErr("IndexedDB error: " + e.target.error);
  };

  r.onblocked = function() {
    window._logErr && window._logErr("IndexedDB bị blocked! Đóng tab khác rồi thử lại.");
  };
}

// wrappers
function dbPut(store, obj, cb) {
  var tx = DB.transaction([store], "readwrite");
  tx.objectStore(store).put(obj);
  tx.oncomplete = function() { if (cb) cb(); };
}
function dbGet(store, key, cb) {
  var tx = DB.transaction([store], "readonly");
  tx.objectStore(store).get(key).onsuccess = function(e) { cb(e.target.result || null); };
}
function dbDel(store, key, cb) {
  var tx = DB.transaction([store], "readwrite");
  tx.objectStore(store).delete(key);
  tx.oncomplete = function() { if (cb) cb(); };
}
function dbAll(store, cb) {
  var items = [];
  DB.transaction([store], "readonly").objectStore(store).openCursor().onsuccess = function(e) {
    var c = e.target.result;
    if (c) { items.push(c.value); c.continue(); }
    else cb(items);
  };
}

// ── Firebase account helpers ──
function fbGetAccount(u, cb) {
  getDoc(doc(fsDB, "accounts", u))
    .then(function(snap) { cb(snap.exists() ? snap.data() : null); })
    .catch(function() { cb(null); });
}
function fbAddAccount(u, p, cb) {
  setDoc(doc(fsDB, "accounts", u), {u: u, p: p, banned: false})
    .then(function() { if(cb) cb(); })
    .catch(function(e) { window._logErr && window._logErr("Firebase addAccount: " + e.message); });
}
function fbDelAccount(u, cb) {
  deleteDoc(doc(fsDB, "accounts", u))
    .then(function() { if(cb) cb(); })
    .catch(function() { if(cb) cb(); });
}
function fbGetAllAccounts(cb) {
  getDocs(collection(fsDB, "accounts"))
    .then(function(snap) {
      var arr = [];
      snap.forEach(function(d) { arr.push(d.data()); });
      cb(arr);
    })
    .catch(function() { cb([]); });
}
function fbBanAccount(u, banned, cb) {
  setDoc(doc(fsDB, "accounts", u), {banned: banned}, {merge: true})
    .then(function() { if(cb) cb(); })
    .catch(function() { if(cb) cb(); });
}

        return;

      songs.sort(function(a,b){ return b.ts - a.ts; });
      songs.forEach(function(s) {

  71:"🌨️",73:"🌨️",75:"❄️",
  80:"🌦️",81:"🌧️",82:"⛈️",
  95:"⛈️",96:"⛈️",99:"⛈️"
};

function fetchWeather() {
  var city = document.getElementById("w-inp").value.trim();
  if (!city) return;
  var res = document.getElementById("w-result");
  res.innerHTML = '<div class="w-loading">⏳ Đang tìm...</div>';

  fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(city) + "&count=1&language=vi")
    .then(function(r){ return r.json(); })
    .then(function(geo) {
      if (!geo.results || !geo.results.length) {
        res.innerHTML = '<div class="w-err">❌ Không tìm thấy "<b>' + city + '</b>"</div>';
        return;
      }
      var loc = geo.results[0];
      var lat = loc.latitude; var lon = loc.longitude;
      var name = loc.name + (loc.country ? ", " + loc.country : "");

      return fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+
        "&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weathercode"+
        "&wind_speed_unit=kmh&timezone=auto")
        .then(function(r){ return r.json(); })
        .then(function(data) {
          var c    = data.current;
          var code = c.weathercode;
          var icon = W_ICONS[code] || "🌡️";
          var desc = W_CODES[code] || "Không xác định";
          res.innerHTML =
            '<div class="w-main">' +
              '<div class="w-icon">' + icon + '</div>' +
              '<div class="w-temp">' + Math.round(c.temperature_2m) + '°C</div>' +
              '<div class="w-desc">' + desc + '</div>' +
              '<div class="w-city">📍 ' + name + '</div>' +
            '</div>' +
            '<div class="w-grid">' +
              '<div class="w-item"><div class="w-item-icon">🌡️</div><div class="w-item-val">' + Math.round(c.apparent_temperature) + '°C</div><div class="w-item-lbl">Cảm giác như</div></div>' +
              '<div class="w-item"><div class="w-item-icon">💧</div><div class="w-item-val">' + c.relative_humidity_2m + '%</div><div class="w-item-lbl">Độ ẩm</div></div>' +
              '<div class="w-item" style="grid-column:span 2"><div class="w-item-icon">💨</div><div class="w-item-val">' + Math.round(c.wind_speed_10m) + ' km/h</div><div class="w-item-lbl">Tốc độ gió</div></div>' +
            '</div>';
        });
    })
    .catch(function() {
      res.innerHTML = '<div class="w-err">❌ Lỗi kết nối, kiểm tra internet!</div>';
    });
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
                  .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
